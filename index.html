    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
      if (typeof window.process === 'undefined') {
        window.process = { env: { API_KEY: "" } };
      }
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Cormorant Garamond"', 'serif'],
              sans: ['"Inter"', 'system-ui', 'sans-serif'],
              mono: ['"Space Mono"', 'monospace'],
              header: ['"Cormorant Garamond"', 'serif'],
            },
            colors: {
              nous: {
                base: 'var(--nous-base)',
                text: 'var(--nous-text)',
                subtle: 'var(--nous-subtle)',
                accent: 'var(--nous-accent)',
                border: 'var(--nous-border)',
              }
            }
          },
        },
      }
    </script>
    <style>
      :root {
        /* Archival Grid Palette - Clean Cream Base */
        --nous-base: #FDFBF7;
        --nous-text: #1A1A1A;
        --nous-subtle: #555555;
        --nous-accent: #111111;
        --nous-border: #E5E5E5;
      }
      
      html, body {
        height: 100dvh;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: var(--nous-base);
        /* TEXTURE: Removed heavy paper image for clean look */
        color: var(--nous-text);
        -webkit-font-smoothing: antialiased;
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        overscroll-behavior-y: none;
      }

      /* Dark mode */
      .dark body {
        background-color: #050505;
      }

      @media print {
        html, body {
          height: auto !important;
          overflow: visible !important;
          background: white !important;
        }
      }

      /* SAFE AREA UTILITIES */
      .pt-safe { padding-top: env(safe-area-inset-top) !important; }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom) !important; }
      .pl-safe { padding-left: env(safe-area-inset-left) !important; }
      .pr-safe { padding-right: env(safe-area-inset-right) !important; }
      .mt-safe { margin-top: env(safe-area-inset-top) !important; }
      .mb-safe { margin-bottom: env(safe-area-inset-bottom) !important; }

      #root {
        height: 100dvh;
        width: 100%;
        display: flex;
        flex-direction: column;
      }

      .grain-overlay {
        position: fixed;
        inset: 0;
        background-image: url("https://www.transparenttextures.com/patterns/noise.png");
        /* TEXTURE: Increased Grain Intensity to compensate for lack of paper texture */
        opacity: 0.14; 
        pointer-events: none;
        z-index: 9999;
        mix-blend-mode: multiply;
      }
      
      .dark .grain-overlay {
        mix-blend-mode: overlay;
        opacity: 0.5;
        background-image: url("https://www.transparenttextures.com/patterns/noise.png");
      }

      .luminescent-text {
        transition: text-shadow 0.8s ease, color 0.8s ease;
      }
      .dark .luminescent-text {
        text-shadow: 
          0 0 12px rgba(255, 255, 255, 0.8), 
          0 0 22px rgba(255, 255, 255, 0.6), 
          0 0 40px rgba(16, 185, 129, 0.2),
          0 0 60px rgba(16, 185, 129, 0.1);
        color: #ffffff;
      }

      .pericardium-seal {
        position: fixed;
        inset: 0;
        height: 100dvh;
        width: 100vw;
        background-color: transparent;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        z-index: 10;
      }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      .rounded-sm { border-radius: 1px !important; }
    </style>

    "html2canvas": "https://esm.sh/html2canvas@1.4.1",

  }
}
</script>
</head>

    <div class="grain-overlay"></div>
