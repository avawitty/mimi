
<!DOCTYPE html>
<html lang="en">
  <head>

    <!-- CACHE SUPPRESSION PROTOCOL -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

    <meta http-equiv="Expires" content="0" />

    <link rel="manifest" href="./metadata.json">
    <meta name="theme-color" content="#FDFBF7" />
    
    <!-- iOS Sovereign Manifestation -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mimi Zine">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Aris-A-C/mimi-assets/main/mimi_logo_new.png">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Aris-A-C/mimi-assets/main/mimi_logo_new.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
      if (typeof window.process === 'undefined') {
        window.process = { env: { API_KEY: "" } };
      }
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Cormorant Garamond"', 'serif'],
              sans: ['"Space Grotesk"', 'sans-serif'],
              mono: ['"Space Mono"', 'monospace'],
              header: ['"Cormorant Garamond"', 'serif'],
            },
            colors: {
              nous: {
                base: 'var(--nous-base)',
                text: 'var(--nous-text)',
                subtle: 'var(--nous-subtle)',
                accent: 'var(--nous-accent)',
              }
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --nous-base: #FDFBF7;
        --nous-text: #1C1917;
        --nous-subtle: #A8A29E;
        --nous-accent: #44403C;
      }
      
      html, body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: var(--nous-base);
        color: var(--nous-text);
        -webkit-font-smoothing: antialiased;
        font-family: "Cormorant Garamond", serif;
      }

      /* THE PERICARDIUM: Re-enforced Structural Sac */
      .pericardium-seal {
        position: fixed;
        inset: 0.5rem;
        border: 1px solid rgba(0,0,0,0.05);
        border-radius: 1rem;
        background-color: var(--nous-base);
        box-shadow: inset 0 0 100px rgba(0,0,0,0.02);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: inset 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        z-index: 10;
      }
      .dark .pericardium-seal {
        border-color: rgba(255,255,255,0.05);
        box-shadow: inset 0 0 100px rgba(0,0,0,0.4);
      }

      /* MOBILE GEOMETRY OVERRIDE */
      .geometry-mobile .pericardium-seal {
        inset: 1.5rem auto 1.5rem 50%;
        width: 375px;
        transform: translateX(-50%);
        border: 8px solid rgba(0,0,0,0.1);
      }

      .grain-overlay {
        position: fixed;
        inset: 0;
        background-image: url("https://www.transparenttextures.com/patterns/noise.png");
        opacity: 0.12;
        pointer-events: none;
        z-index: 9999;
        mix-blend-mode: multiply;
      }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      .pt-safe { padding-top: env(safe-area-inset-top); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.29.2",
    "firebase/": "https://esm.sh/firebase@^12.8.0/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
</head>
  <body>
    <div class="grain-overlay"></div>
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
