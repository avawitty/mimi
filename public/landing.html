<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimi Zine | Aesthetic Intelligence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --bg: #FDFBF7;
            --text: #1C1917;
            --accent: #059669;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0C0A09;
                --text: #F5F5F4;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .grain {
            position: fixed;
            inset: 0;
            opacity: 0.05;
            pointer-events: none;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            z-index: 10;
            opacity: 0;
            animation: fade-in 2s ease-out forwards;
        }

        h1 {
            font-size: 4rem;
            font-weight: 300;
            font-style: italic;
            margin: 0 0 1rem 0;
            letter-spacing: -0.05em;
        }

        p {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.6;
            margin-bottom: 3rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(120, 113, 108, 0.2);
            border-radius: 999px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mimi.</h1>
        <p>Aesthetic Intelligence Registry</p>
        
        <div class="status">
            <div class="dot"></div>
            <span>System Active</span>
        </div>
    </div>
</body>
</html>
